name: stock-tracker / backtest

# Daily after US market close. Two jobs run sequentially:
#   1. backtest.py — fills expected_1d/3d/5d on new signals using analogue
#      matching against historical similar-magnitude signals (priors).
#   2. realize.py  — fills realized_1d/3d/5d on signals at least 7 calendar
#      days old by looking up the actual forward close prices (measurement).
# 23:00 UTC ≈ 18:00/19:00 ET (after-hours done). Mon-Fri.
on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - name: Backfill expected_* (analogue priors)
        run: python backtest.py
      - name: Backfill realized_* (actual forward returns)
        # Continue even if backtest.py failed — realize.py is independent.
        if: ${{ always() }}
        run: python realize.py
