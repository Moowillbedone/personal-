name: stock-tracker / backtest

# Daily after US market close. Three jobs run sequentially:
#   1. backtest.py  — fills expected_1d/3d/5d on new signals using analogue
#      matching against historical similar-magnitude signals (priors).
#   2. realize.py   — fills realized_1d/3d/5d on signals at least 7 calendar
#      days old by looking up the actual forward close prices (measurement).
#   3. ai_realize.py — fills realized_1d/3d/5d/30d on ai_analysis rows by
#      comparing context.last_price to forward closes (AI-verdict edge
#      measurement — drives /stats AI accuracy section).
# Runs four times per US weekday so freshly-fired signals get their
# expected_* / realized_* columns filled within hours instead of waiting
# up to 24h for the next daily run. Without this, every signal that fires
# during the regular session shows blank E[1d/3d/5d] columns on the
# /signals page until the next morning's run — fine for the priors but
# bad for at-a-glance triage.
#
#   05 UTC = KST 14:00 weekday afternoon — catches yesterday's afterhours
#   11 UTC = KST 20:00 weekday evening   — pre-market about to start
#   19 UTC = KST 04:00 next-day dawn     — mid US regular session
#   23 UTC = KST 08:00 next-day morning  — full regular + early after
#
# Weekday cron (1-5 = Mon-Fri UTC). Overlap with US sessions is fine —
# the backfill query is idempotent (only touches expected_1d IS NULL rows)
# so repeated runs cost only the daily-bar fetch and quickly skip.
on:
  schedule:
    - cron: "0 5 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - name: Backfill signals.expected_* (analogue priors)
        run: python backtest.py
      - name: Backfill signals.realized_* (actual forward returns)
        # Continue even if backtest.py failed — realize.py is independent.
        if: ${{ always() }}
        run: python realize.py
      - name: Backfill ai_analysis.realized_* (AI verdict accuracy)
        # Independent of the signals jobs above.
        if: ${{ always() }}
        run: python ai_realize.py
