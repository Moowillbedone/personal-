name: stock-tracker / backtest

# Daily after US market close: fill expected_1d/3d/5d on new signals.
# 23:00 UTC ≈ 18:00/19:00 ET (after-hours done). Mon-Fri.
on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python backtest.py
