name: stock-tracker / ai-scan

# Twice daily: run /api/analyze on watchlist symbols and telegram a
# BUY/SELL/HOLD digest. Each run aligns with a decision-critical moment
# in the US session so the user sees fresh AI verdicts before acting.
#
#   13:00 UTC  =  ET 09:00  =  KST 22:00  (regular session opens in 30m)  ← primary
#   21:00 UTC  =  ET 17:00  =  KST 06:00  (after-hours done, next-day plan)
#
# Dropped 2026-05-20: 08:00 UTC (KST 17:00 pre-market start). Free-tier
# gemini-2.5-flash on this project has 20 RPD; 3×6 watchlist = 18 left
# zero room for manual clicks. 2×6 = 12 keeps comfortable safety margin.
# Pre-market signals still get logged in DB by poll.py for the 22:00 scan
# to factor in via signals_24h context.
#
# Weekdays only (US market is closed Sat/Sun). 2x/day × 6 watchlist
# = 12 Gemini calls/day on primary gemini-2.5-flash (REAL free-tier
# RPD = 20, not 250 docs). Manual /api/analyze clicks (~1-2/day) keep
# total well within 70% of the daily quota.
on:
  # Triggered exclusively by cron-job.org via workflow_dispatch at the
  # intended times (08/13/21 UTC = KST 17/22/06). GitHub Actions' native
  # `schedule:` cron was removed 2026-05-19 because it ran in addition to
  # cron-job.org — at unpredictable delays of 30min~3.5h — producing
  # DUPLICATE digests at random KST times (e.g., 20:28, 01:16) and
  # doubling Gemini API consumption (75 → 150 calls/day). cron-job.org
  # is reliable enough that the GH Actions backup is net harmful.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ai-scan:
    runs-on: ubuntu-latest
    # 75 min covers the worst case of 100 symbols × ~32s each (analyze maxDuration
    # is 60s, typical 25-35s, plus 2s inter-call delay) with comfortable buffer.
    timeout-minutes: 75
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Override only if the deployed Vercel URL ever changes.
      FRONT_URL: ${{ secrets.FRONT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python ai_scan.py
