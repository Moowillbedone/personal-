name: stock-tracker / ai-scan

# Three times daily: run /api/analyze on watchlist + 24h-fired-signal
# symbols and telegram a BUY/SELL/HOLD digest. Each run aligns with the
# START of a US trading session so the user sees fresh AI verdicts before
# acting.
#
#   08:00 UTC  =  ET 04:00  =  KST 17:00  (pre-market session start)
#   13:00 UTC  =  ET 09:00  =  KST 22:00  (regular session opens in 30m)
#   21:00 UTC  =  ET 17:00  =  KST 06:00  (after-hours running, daily wrap)
#
# Weekdays only (US market is closed Sat/Sun). 3x/day × 60 symbols
# = 180 Gemini calls/day on primary gemini-2.5-flash (250 RPD limit).
# Manual /api/analyze clicks (~20-30/day) keep total within ~80% of
# the daily budget. See worker/ai_scan.py SCAN_BUDGET docstring for
# full sizing rationale.
on:
  # Triggered exclusively by cron-job.org via workflow_dispatch at the
  # intended times (08/13/21 UTC = KST 17/22/06). GitHub Actions' native
  # `schedule:` cron was removed 2026-05-19 because it ran in addition to
  # cron-job.org — at unpredictable delays of 30min~3.5h — producing
  # DUPLICATE digests at random KST times (e.g., 20:28, 01:16) and
  # doubling Gemini API consumption (75 → 150 calls/day). cron-job.org
  # is reliable enough that the GH Actions backup is net harmful.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ai-scan:
    runs-on: ubuntu-latest
    # 75 min covers the worst case of 100 symbols × ~32s each (analyze maxDuration
    # is 60s, typical 25-35s, plus 2s inter-call delay) with comfortable buffer.
    timeout-minutes: 75
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Override only if the deployed Vercel URL ever changes.
      FRONT_URL: ${{ secrets.FRONT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python ai_scan.py
