name: stock-tracker / ai-scan

# Twice daily: run /api/analyze on watchlist + 24h-fired-signal symbols
# and telegram a BUY/SELL/HOLD digest.
#
#   13:00 UTC  =  ET 09:00  =  KST 22:00  (premarket, 30 min before open)
#   21:00 UTC  =  ET 17:00  =  KST 06:00  (after-hours done, next-day plan)
#
# Weekdays only (US market is closed Sat/Sun).
on:
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ai-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Override only if the deployed Vercel URL ever changes.
      FRONT_URL: ${{ secrets.FRONT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python ai_scan.py
