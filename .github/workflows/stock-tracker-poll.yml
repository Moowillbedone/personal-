name: stock-tracker / poll

# Long-running pattern: cron triggers every 4-5 hours, each run loops internally
# every 5 minutes for ~5h20m. Adjacent runs overlap, so the effective polling
# cadence stays a true 5 min regardless of GitHub Actions cron drift (which can
# delay individual triggers by 30-150 min on the free tier).
#
# Daily compute: ~5 launches × 5h20m ≈ 26 hr ⇒ public-repo Actions has unlimited
# minutes, so no quota concern. Concurrent runs during the 20-min overlap are
# idempotent: signal_exists() dedupes signals, price_snapshots are upserted.
on:
  schedule:
    # UTC 08:00 (covers EDT pre-market 04:00 ET start)
    - cron: "0 8 * * 1-5"
    # UTC 13:00 (covers regular session start in EDT)
    - cron: "0 13 * * 1-5"
    # UTC 18:00
    - cron: "0 18 * * 1-5"
    # UTC 23:00 (covers tail end of after-hours)
    - cron: "0 23 * * 1-5"
    # UTC 03:00 next day for late after-hours / EST winter coverage
    - cron: "0 3 * * 2-6"
  workflow_dispatch:
    inputs:
      loop_min:
        description: "Loop minutes (0 = single-shot)"
        default: "0"
        required: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # under GitHub Actions 6-hour hard limit
    defaults:
      run:
        working-directory: stock-tracker/worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # 5h20m loop on cron triggers; manual triggers honor the input (default 0 = single shot).
      LOOP_MIN: ${{ github.event_name == 'schedule' && '320' || (inputs.loop_min || '0') }}
      LOOP_INTERVAL_SEC: "300"
      # Threshold tuning (2026-05): defaults were too strict — only 20 vol_spikes
      # in 48h, zero gap_up/gap_down. Loosened to capture more meaningful moves
      # while keeping the dollar-volume floor that filters microcap noise.
      GAP_PCT:        "0.008"     # was 1.2% → 0.8% (more 5-min moves qualify)
      VOL_RATIO:      "2.0"       # was 2.5x → 2.0x (still anomalous, more frequent)
      MIN_DOLLAR_VOL: "1000000"   # was $2M → $1M (still ≈14억원, blocks microcaps)
      # MIN_VOLUME:     "5000"      # absolute share count floor (default)
      # VOLUME_WINDOW:  "midday"    # 'regular' (default, 09:30-16:00 ET) | 'midday' (10:00-15:30 ET)
      # MAX_AGE_MIN:    "15"        # ignore signals where latest bar is older than this many min
      NOTIFY_TYPES:   "gap_up,gap_down,volume_spike"   # push all three to Telegram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: stock-tracker/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python poll.py
